<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DMD in the browser</title>
<style>
  body { font: 14px/1.4 system-ui, sans-serif; margin: 0; background: #1e1e1e; color: #ddd; }
  header { padding: 10px 16px; background: #252526; border-bottom: 1px solid #333; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header span { color: #888; font-size: 12px; }
  .cols { display: flex; height: calc(100vh - 52px); }
  .pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .pane + .pane { border-left: 1px solid #333; }
  .pane h2 { font-size: 12px; text-transform: uppercase; color: #888; margin: 0; padding: 6px 12px; background: #252526; }
  textarea, pre { flex: 1; margin: 0; padding: 12px; border: 0; font: 13px/1.45 ui-monospace, monospace;
                  background: #1e1e1e; color: #d4d4d4; white-space: pre; overflow: auto; tab-size: 4; }
  textarea { resize: none; outline: none; }
  .bar { padding: 8px 12px; background: #252526; border-top: 1px solid #333; }
  button { font: 13px system-ui; padding: 6px 16px; background: #0e639c; color: #fff; border: 0; border-radius: 3px; cursor: pointer; }
  button:hover { background: #1177bb; }
  #diag { flex: 0 0 auto; max-height: 25%; color: #f48771; border-top: 1px solid #333; }
  #status { color: #888; margin-left: 12px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>DMD compiled to WebAssembly Demo</h1>
</header>
<div class="cols">
  <div class="pane">
    <h2>D source</h2>
    <textarea id="src" spellcheck="false">module test;

int add(int a, int b) { return a + b; }

enum N = 3;

int[] squares()
{
    int[] r;
    foreach (i; 0 .. N)
        r ~= i * i;
    return r;
}
</textarea>
    <div class="bar"><button id="run" title="Run (Ctrl+Enter / ⌘+Enter)">Run ▶</button><span id="status">loading dmd.wasm…</span></div>
  </div>
  <div class="pane">
    <h2>Parse tree (printAST)</h2>
    <pre id="parse"></pre>
  </div>
  <div class="pane">
    <h2>Lowered AST (-vcg-ast)</h2>
    <pre id="ast"></pre>
    <pre id="diag"></pre>
  </div>
  <div class="pane">
    <h2>x86-64 disassembly (-vasm)</h2>
    <pre id="asm"></pre>
  </div>
</div>

<script type="module">
import { loadDmd, compile } from "./glue.js";

const $ = (id) => document.getElementById(id);

function run() {
    const t0 = performance.now();
    const { parse, ast, asm, errors, diagnostics } = compile($("src").value);
    const ms = (performance.now() - t0).toFixed(1);
    $("parse").textContent = parse || "(no output)";
    $("ast").textContent = ast || "(no output)";
    $("asm").textContent = asm || "(no code generated)";
    $("diag").textContent = diagnostics || "";
    $("status").textContent = `errors: ${errors} · ${ms} ms`;
}

(async () => {
    try {
        await loadDmd("dmd.wasm");
        $("status").textContent = "ready";
        $("run").addEventListener("click", run);
        // Ctrl+Enter (or ⌘+Enter on macOS) runs from anywhere, incl. the editor.
        document.addEventListener("keydown", (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); run(); }
        });
        run();
    } catch (e) {
        $("status").textContent = "load failed: " + e.message;
        console.error(e);
    }
})();
</script>
</body>
</html>
